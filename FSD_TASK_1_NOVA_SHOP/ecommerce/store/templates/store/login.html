{% extends 'store/base.html' %}
{% block title %}Login — NOVA{% endblock %}
{% block extra_head %}
<style>
  .auth-page { display: flex; justify-content: center; padding: 4rem 1rem; }
  .auth-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2.5rem;
    width: 100%; max-width: 420px;
  }
  .auth-logo { font-family: var(--font-display); font-size: 2.5rem; text-align: center; margin-bottom: 2rem; }
  .auth-logo span { color: var(--accent); }
  .auth-box h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
  .auth-box p { color: var(--muted); font-size: 14px; margin-bottom: 2rem; }
  .auth-submit {
    width: 100%; padding: 12px;
    background: var(--accent); color: #000;
    border: none; border-radius: var(--radius);
    font-weight: 700; font-size: 15px; cursor: pointer;
    transition: background .2s;
  }
  .auth-submit:hover { background: #d4eb35; }
  .auth-link { text-align: center; margin-top: 1.5rem; font-size: 14px; color: var(--muted); }
  .auth-link a { color: var(--accent); font-weight: 600; }
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">NOV<span>A</span></div>
    <h1>Welcome back</h1>
    <p>Sign in to your account to continue.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input class="form-control" type="text" name="username" placeholder="your_username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="auth-submit">Sign In →</button>
    </form>
    <div class="auth-link">Don't have an account? <a href="/register/">Register</a></div>
    <div style="text-align:center;margin-top:1rem;font-size:12px;color:var(--muted)">
      Demo: <code>demo / demo1234</code>
    </div>
  </div>
</div>
{% endblock %}
